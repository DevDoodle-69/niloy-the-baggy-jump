<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BAGGY AMAR" />
    <meta name="theme-color" content="#1a0b3d" />
    <meta name="description" content="Endless runner in neon-drenched Dheka City. Run, jump, slide, survive!" />
    <title>BAGGY AMAR 3 DA</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    <style>
      /* Block any initial flash of white */
      html { background: #1a0b3d; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      /* Service Worker */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW failed:', err));
        });
      }

      /* Orientation lock — keep the game in landscape on mobile */
      function tryLockLandscape() {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      }

      /* Lock on first user interaction (required by browsers) */
      document.addEventListener('pointerdown', tryLockLandscape, { once: true });
      document.addEventListener('touchstart', tryLockLandscape, { once: true });
      /* Also try immediately (works in some PWA contexts) */
      tryLockLandscape();
    </script>
  </body>
</html>
